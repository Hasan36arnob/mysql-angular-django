<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>Django + AngularJS App</title>
    <script>window.API_BASE='/api'</script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="/static/js/app.js"></script>
</head>
<body ng-controller="MainController">
    <div class="container">
        <h1>Django + AngularJS CRUD App</h1>
        
        <div class="form-group">
            <h3>Add New Item</h3>
            <input type="text" ng-model="newItem.name" placeholder="Item name" />
        </div>
        
        <div class="form-group">
            <textarea ng-model="newItem.description" placeholder="Item description" rows="3"></textarea>
        </div>
        
        <button ng-click="addItem()">Add Item</button>
        
        <div class="error" ng-if="error">{{ error }}</div>
        
        <div class="items-list">
            <h3>Items List</h3>
            <div class="item" ng-repeat="item in items">
                <div ng-if="!item.editing">
                    <h3>{{ item.name }}</h3>
                    <p>{{ item.description }}</p>
                    <small>Created: {{ item.created_at | date:'medium' }}</small>
                    <div style="margin-top:10px">
                        <button ng-click="startEdit(item)">Edit</button>
                        <button style="margin-left:8px;background:#c62828" ng-click="deleteItem(item)">Delete</button>
                    </div>
                </div>
                <div ng-if="item.editing">
                    <input type="text" ng-model="item.editName" placeholder="Name" />
                    <textarea ng-model="item.editDescription" placeholder="Description" rows="3"></textarea>
                    <div style="margin-top:10px">
                        <button ng-click="saveEdit(item)">Save</button>
                        <button style="margin-left:8px;background:#757575" ng-click="cancelEdit(item)">Cancel</button>
                    </div>
                </div>
            </div>
            <div ng-if="items.length === 0">
                <p>No items found. Add some items to get started!</p>
            </div>
        </div>
    </div>

    <script></script>
</body>
</html>
