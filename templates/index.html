<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>Django + AngularJS App</title>
    <script>window.API_BASE='/api'</script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="/static/js/app.js"></script>
</head>
<body ng-controller="MainController">
    <div class="nav">Django × AngularJS</div>
    <div class="wrap">
        <div class="panel">
            <div class="title">Add Item</div>
            <div class="subtitle">Create an entry with a name and description.</div>
            <div class="row">
                <div class="field">
                    <input type="text" ng-model="newItem.name" placeholder="Name">
                </div>
                <div class="field" style="flex:2 1 420px">
                    <textarea ng-model="newItem.description" placeholder="Description"></textarea>
                </div>
            </div>
            <div style="margin-top:12px">
                <button class="btn btn-primary" ng-disabled="saving" ng-click="addItem()">Add Item</button>
                <span class="loading" ng-if="saving">Saving…</span>
            </div>
            <div class="status" ng-if="message">{{ message }}</div>
            <div class="status" style="color:#f87171" ng-if="error">{{ error }}</div>
        </div>

        <div class="panel" style="margin-top:16px">
            <div class="title">Items</div>
            <div class="grid">
                <div class="card" ng-repeat="item in items">
                    <div ng-if="!item.editing">
                        <h3>{{ item.name }}</h3>
                        <p>{{ item.description }}</p>
                        <div class="meta">Created {{ item.created_at | date:'medium' }}</div>
                        <div class="actions">
                            <button class="btn btn-secondary" ng-click="startEdit(item)">Edit</button>
                            <button class="btn btn-danger" ng-click="deleteItem(item)">Delete</button>
                        </div>
                    </div>
                    <div ng-if="item.editing">
                        <input type="text" ng-model="item.editName" placeholder="Name">
                        <textarea ng-model="item.editDescription" placeholder="Description" style="margin-top:8px"></textarea>
                        <div class="actions">
                            <button class="btn btn-primary" ng-click="saveEdit(item)">Save</button>
                            <button class="btn btn-secondary" ng-click="cancelEdit(item)">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="status" ng-if="loading">Loading…</div>
            <div class="status" ng-if="!loading && items.length === 0">No items yet.</div>
        </div>
    </div>

    <script></script>
</body>
</html>
